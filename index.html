<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Digital Menu | €</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Wishlist Trigger (Горе вляво) -->
    <div id="wishlist-trigger" class="fab-top-left" onclick="toggleWishlist()">
        <span class="fab-icon">📜</span>
        <span id="count">0</span>
    </div>

    <!-- Category Bubble (Долу вляво) -->
    <div class="category-fab-wrapper fab-bottom-left">
        <div id="category-dropup" class="dropup-menu"></div>
        <div id="category-trigger" class="fab-item main-fab" onclick="toggleCategoryMenu()">
            <span class="fab-label">КАТЕГОРИИ</span>
        </div>
    </div>

    <!-- Hero Section -->
    <header class="hero">
        <div class="hero-content">
            <p class="hero-pre">ДОБРЕ ДОШЛИ В</p>
            <h1 class="hero-title">ELITE BISTRO</h1>
            <div class="gold-line"></div>
            <p class="hero-tagline">Вкусете съвършенството</p>
        </div>
    </header>

    <main class="container">
        <div id="loader" class="loader-box">
            <div class="spinner"></div>
            <p>Подреждаме масата...</p>
        </div>
        <div id="menu-content"></div>
    </main>

    <!-- Modal Overlay -->
    <div id="overlay" class="overlay" onclick="closeModal()">
        <div class="modal" onclick="event.stopPropagation()">
            <button class="close-x" onclick="closeModal()">✖</button>
            <div id="modal-img" class="modal-img"></div>
            <div class="modal-info">
                <div class="modal-header">
                    <h2 id="modal-title"></h2>
                    <span id="modal-price" class="modal-badge"></span>
                </div>
                <p id="modal-desc"></p>
                <button class="btn-add-modal" id="add-to-wish-btn">Добави към списъка</button>
            </div>
        </div>
    </div>

    <!-- Wishlist Sidebar -->
    <div id="wishlist-sidebar" class="sidebar">
        <div class="sidebar-top">
            <h3>Моите Желания</h3>
            <button class="close-sidebar" onclick="toggleWishlist()">✖</button>
        </div>
        <div id="wishlist-items" class="sidebar-list"></div>
        <div class="sidebar-footer" id="sidebar-footer"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
